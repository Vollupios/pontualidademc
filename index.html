<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise de Ponto Embutida</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9e2ec;
      --ink: #102a43;
      --muted: #627d98;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --warn: #b45309;
      --danger: #b91c1c;
      --ok: #15803d;
      --radius: 14px;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --head: "Trebuchet MS", "Segoe UI", sans-serif;
      --body: "Verdana", "Tahoma", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--body);
      background:
        radial-gradient(circle at 0 0, #e4f4ef 0, transparent 35%),
        radial-gradient(circle at 100% 0, #e8efff 0, transparent 42%),
        var(--bg);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      border-radius: var(--radius);
      padding: 22px;
      color: #fff;
      background: linear-gradient(135deg, #0f766e, #1d4ed8);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font: 700 1.7rem/1.2 var(--head);
      letter-spacing: .03em;
    }

    .hero p {
      margin: 10px 0 0;
      opacity: .95;
    }

    .stamp {
      margin-top: 8px;
      font-size: .85rem;
      opacity: .88;
    }

    .grid {
      margin-top: 16px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 14px;
      animation: in .35s ease both;
    }

    @keyframes in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .label {
      color: var(--muted);
      font-size: .84rem;
      margin-bottom: 6px;
    }

    .value {
      font: 700 1.45rem/1.1 var(--head);
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .75rem;
      font-weight: 700;
    }

    .ok { background: #e9f8ef; color: var(--ok); }
    .warn { background: #fff4df; color: var(--warn); }
    .bad { background: #ffe9e9; color: var(--danger); }

    .section {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      font: 700 1.05rem/1.2 var(--head);
    }

    .body { padding: 14px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: #334e68;
      font-family: var(--head);
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 12px;
    }

    .chart-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fcfdff;
    }

    .chart-title {
      margin: 0 0 8px;
      font: 700 .95rem/1.2 var(--head);
      color: #334e68;
    }

    canvas {
      width: 100%;
      height: 260px;
      display: block;
      background: #fff;
      border: 1px solid #e6edf5;
      border-radius: 8px;
    }

    .small { color: var(--muted); font-size: .8rem; }

    @media (max-width: 760px) {
      .wrap { padding: 12px; }
      .hero h1 { font-size: 1.35rem; }
      th, td { font-size: .8rem; }
      canvas { height: 230px; }
    }
  </style>
</head>

    </section>

    function toHHMM(totalMin) {
      const sign = totalMin < 0 ? "-" : "";
      const abs = Math.abs(totalMin);
      const hh = String(Math.floor(abs / 60)).padStart(2, "0");
      const mm = String(abs % 60).padStart(2, "0");
      return `${sign}${hh}:${mm}`;
    }

    function qualityTag(percent) {
      if (percent >= 90) return '<span class="badge ok">Excelente</span>';
      if (percent >= 75) return '<span class="badge warn">Atenção</span>';
      return '<span class="badge bad">Crítico</span>';
    }

    function chartSectorLabel(sector) {
      return String(sector || "")
        .replace(/^DEPARTAMENTO\s+/i, "")
        .trim();
    }

    function aggregateBySector(rows) {
      const map = new Map();
      for (const e of rows) {
        const key = e.sector || "(sem setor)";
        if (!map.has(key)) {
          map.set(key, {
            sector: key,
            n: 0,
            punctuality: 0,
            delayDays: 0,
            delayMin: 0,
            extraMin: 0,
            frequency: 0
          });
        }
        const s = map.get(key);
        s.n += 1;
        s.punctuality += e.metrics.punctuality;
        s.delayDays += e.metrics.delayDays;
        s.delayMin += e.metrics.totalDelayMin;
        s.extraMin += e.metrics.totalExtraMin;
        s.frequency += e.metrics.frequency;
      }
      return [...map.values()].map(s => ({
        ...s,
        punctualityAvg: s.n ? Math.round(s.punctuality / s.n) : 0,
        frequencyAvg: s.n ? Math.round(s.frequency / s.n) : 0
      })).sort((a, b) => a.sector.localeCompare(b.sector, "pt-BR"));
    }

    function drawBarChart(canvasId, labels, values, opts = {}) {

      const ctx = canvas.getContext("2d");

      const targetHeight = Math.max(260, labels.length * 34 + 24);
      canvas.height = targetHeight;
      canvas.style.height = `${targetHeight}px`;

      const w = canvas.width;
      const h = canvas.height;

      ctx.clearRect(0, 0, w, h);

      const labelW = 120;
      const valueW = 62;
      const left = labelW + 10;
      const right = valueW + 8;
      const top = 12;
      const bottom = 20;
      const plotW = w - left - right;
      const rowH = (h - top - bottom) / Math.max(labels.length, 1);
      const barH = Math.max(10, rowH * 0.54);
      const max = Math.max(1, ...values);

      ctx.font = "11px Verdana";
      ctx.fillStyle = "#627d98";

      labels.forEach((label, i) => {
        const y = top + i * rowH + (rowH - barH) / 2;
        const val = values[i] || 0;
        const barW = (val / max) * plotW;
        const baseline = y + barH - 1;

        ctx.fillStyle = "#f1f5f9";
        ctx.fillRect(left, y, plotW, barH);

        const grad = ctx.createLinearGradient(left, y, left + barW, y + barH);
        grad.addColorStop(0, opts.colorA || "#0f766e");
        grad.addColorStop(1, opts.colorB || "#1d4ed8");
        ctx.fillStyle = grad;
        ctx.fillRect(left, y, barW, barH);

        ctx.fillStyle = "#334e68";
        const short = label.length > 17 ? label.slice(0, 15) + ".." : label;
        ctx.fillText(short, 8, baseline);

        const valueLabel = opts.formatter ? opts.formatter(val) : String(val);
        ctx.fillStyle = "#102a43";
        ctx.textAlign = "right";
        ctx.fillText(valueLabel, w - 8, baseline);
        ctx.textAlign = "left";
      });
    }

    function render() {
      const rows = EMBEDDED_EMPLOYEES;
      const sectors = aggregateBySector(rows);

      const totals = rows.reduce((acc, e) => {
        acc.n += 1;
        acc.p += e.metrics.punctuality;
        acc.delayDays += e.metrics.delayDays;
        acc.delayMin += e.metrics.totalDelayMin;
        acc.extra += e.metrics.totalExtraMin;
        return acc;
      }, { n: 0, p: 0, delayDays: 0, delayMin: 0, extra: 0 });

      const punctualityAvg = totals.n ? Math.round(totals.p / totals.n) : 0;

      kpisEl.innerHTML = `
        <article class="card"><div class="label">Colaboradores</div><div class="value">${totals.n}</div></article>
        <article class="card"><div class="label">Pontualidade Média</div><div class="value">${punctualityAvg}%</div>${qualityTag(punctualityAvg)}</article>
        <article class="card"><div class="label">Horas Extras Totais</div><div class="value">${toHHMM(totals.extra)}</div></article>
      `;

      tableSectorEl.innerHTML = sectors.map(s => `
        <tr>
          <td>${s.sector}</td>
          <td>${s.n}</td>
          <td>${s.punctualityAvg}%</td>
          <td>${s.delayDays}</td>
          <td>${toHHMM(s.delayMin)}</td>
          <td>${toHHMM(s.extraMin)}</td>
        </tr>
      `).join("");

      tableEmployeeEl.innerHTML = [...rows]
        .sort((a, b) => a.name.localeCompare(b.name, "pt-BR"))
        .map(e => `
          <tr>
            <td>${e.name}</td>
            <td>${e.sector}</td>
            <td>${e.metrics.punctuality}%</td>
            <td>${e.metrics.delayDays} (${toHHMM(e.metrics.totalDelayMin)})</td>
            <td>${toHHMM(e.metrics.totalExtraMin)}</td>
          </tr>
        `).join("");

      const labels = sectors.map(s => chartSectorLabel(s.sector));
      drawBarChart("chartPunctuality", labels, sectors.map(s => s.punctualityAvg), {
        colorA: "#0f766e",
        colorB: "#059669",
        formatter: v => `${v}%`
      });
      drawBarChart("chartExtra", labels, sectors.map(s => s.extraMin), {
        colorA: "#1d4ed8",
        colorB: "#2563eb",
        formatter: v => toHHMM(v)
      });

      stampEl.textContent = "";
    }

    render();
  </script>
</body>
</html>
